# Colruyt Private Cloud (CPC) — container deployment.
#
#   docker compose up -d --build
#
# Runtime data lives in the named volume `cpc-data`, not in the image. A brand
# new host/volume therefore starts as a fresh, unconfigured app (default admin
# seeded on first run — change its password immediately). Configuration is done
# at runtime via env vars below and/or the in-app Settings page.

services:
  cpc:
    build:
      context: .
      dockerfile: Dockerfile
    image: cpc:latest
    container_name: cpc
    restart: unless-stopped
    ports:
      # host:container — change the host port if 4100 is taken.
      - "4100:4100"
    environment:
      NODE_ENV: production
      PORT: "4100"
      # --- Set these for a real deployment (or configure via Settings UI) ---
      # JWT_SECRET: "change-me-to-a-long-random-string"
      # CPC_ADMIN_PASSWORD: "set-a-strong-first-run-admin-password"
      # PROXMOX_HOST: "10.0.0.10"
      # PROXMOX_PORT: "8006"
      # PROXMOX_NODE: "pve"
      # PROXMOX_USERNAME: "root@pam"
      # PROXMOX_PASSWORD: "..."
      # PROXMOX_VERIFY_SSL: "false"
    # Alternatively, load everything from a file (kept out of the image):
    # env_file:
    #   - backend/.env
    volumes:
      - cpc-data:/app/backend/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+(process.env.PORT||4100)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 15s

volumes:
  cpc-data:
